<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICHARLAS</title>
    <link rel="stylesheet" href="/CSS/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">  
</head>
<body>
    <header class="encabezadoClass" id="encabezadoID">
        <div id="img">
            <img src="/IMAGENES/UdeC_2L izq Blanco.png" alt="SICHARLAS" id="logo">
        </div>
        <h1>SICHARLAS</h1>
    </header>
    <nav class="navClass" id="navID">
        <div id="home">
            <li><a class="link-light link-offset-2 link-underline link-underline-opacity-0" href="index.html">Inicio</a></li>
        </div>
        <ul class="links"></ul>
            <div id="pages">
                <li><a  class="link-light link-offset-2 link-underline link-underline-opacity-0" href="/PAGES/listado.html">Listado</a></li>
                <li><a class="link-light link-offset-2 link-underline link-underline-opacity-0" href="PAGES/charlas.html">Charlas</a></li>
                <li><a class="link-light link-offset-2 link-underline link-underline-opacity-0" href="PAGES/programacion.html">Programación</a></li>
            </div>
        </ul>
    </nav>
    <main class="mainClass" id="mainID">
        <form id="form">
            <label for="usuario_nombre">Nombre del participante:</label>
            <input type="text" id="usuario_nombre">
            <label for="no_cuenta">Número de cuenta:</label>
            <input type="text" id="no_cuenta">
            <label for="nombre_charla">Nombre de la charla:</label>
            <select name="" id="nombre_charla">
                <option value="" selected disabled hidden></option>
                <option value="Musica">Musica</option>
                <option value="Cine">Cine</option>
                <option value="Deporte">Deporte</option>
                <option value="Cultura">Cultura</option>
            </select>
            <label for="cupo_maximo">Cupo máximo:</label>
            <select id="cupo_maximo">
                <option value="" selected disabled hidden></option>
                <option value="15">15</option>
                <option value="20">20</option>
                <option value="30">30</option>
                <option value="50">50</option>
            </select>
            <div id="buttons">
                <button id="buttonRegistrar" type="button" onclick=mostrar()>Guardar</button>
                <input type="reset" value="Cancelar">
            </div>
        </form>
    </main>
    <footer class="footer bg-secondary text-white text-center py-5">
    <div class="container">
        <div class="row">
            <div class="col-12 text-center">
                <p class="textos_footer">© 2026 Universidad de Colima</p>
            </div>
        </div>
    </div>
</footer>
    <script src="JS/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
